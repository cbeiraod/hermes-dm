# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

sphinx:
  configuration: docs/conf.py

# Tell RTD to install your package via pip, including the 'docs' optional dependencies
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
