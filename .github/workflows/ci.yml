name: Hermes-DM CI

# 1. PATH FILTERING & TRIGGERS
on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]       # Triggers on version tags (e.g., v1.0.0, v0.1.0-rc1)
    paths:                   # Ignores pure documentation changes
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      full_matrix:
        description: "Force run Windows and macOS tests"
        type: boolean
        default: false

# Prevents multiple pipelines from running at the same time if you push twice quickly
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================
  # JOB 1: LINT & FORMAT (The Fail-Fast Gate)
  # ==========================================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 5       # 3. STRICT TIMEOUTS

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"       # 2. DEPENDENCY CACHING (Instant magic!)

      - name: Install Linting Tools
        run: pip install pre-commit

      - name: Run Pre-commit Hooks
        run: pre-commit run --all-files


  # ==========================================
  # JOB 2: LINUX BASELINE (Runs every time)
  # ==========================================
  test-linux:
    name: Test (Linux)
    needs: lint              # Only runs if linting passes
    runs-on: ubuntu-latest
    timeout-minutes: 10      # Generous enough for PyVISA scans, strict enough to prevent runaway loops

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Hermes and Dev Dependencies
        run: pip install -e ".[dev,pyvisa-py]"

      - name: Run Pytest
        run: pytest -v


  # ==========================================
  # JOB 3: RELEASE CANDIDATES (Windows & macOS)
  # ==========================================
  test-extended-os:
    name: Test (${{ matrix.os }})
    needs: test-linux        # Only runs if Linux passes first
    # 4. CONDITIONAL TRIGGER: Only runs if it's a version tag OR manually requested
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.full_matrix == 'true'

    strategy:
      fail-fast: false       # If Windows fails, let macOS finish so we see all errors
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Hermes and Dev Dependencies
        run: pip install -e ".[dev,pyvisa-py]"

      - name: Run Pytest
        run: pytest -v

  # ==========================================
  # JOB 4: BUILD DISTRIBUTION
  # ==========================================
  build-dist:
    name: Build distribution 📦
    needs: test-extended-os       # Wait for all tests on all OSs to pass!
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pypa/build
        run: pip install build

      - name: Build a binary wheel and a source tarball
        run: python -m build

      - name: Store the distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  # ==========================================
  # JOB 5: PUBLISH TO PYPI
  # ==========================================
  publish-to-pypi:
    name: Publish to PyPI
    needs: build-dist
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/hermes-dm  # Ensure this matches your exact PyPI package name!

    permissions:
      id-token: write  # Mandatory for Trusted Publishing (OIDC)

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ==========================================
  # JOB 6: GITHUB RELEASE & SIGSTORE
  # ==========================================
  github-release:
    name: Sign with Sigstore and upload to GitHub Release
    needs: publish-to-pypi
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Mandatory for making GitHub Releases
      id-token: write  # Mandatory for sigstore

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Sign the dists with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: >-
            ./dist/*.tar.gz
            ./dist/*.whl

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release create
          '${{ github.ref_name }}'
          --repo '${{ github.repository }}'
          --notes "Automated release generated from tag ${{ github.ref_name }}"

      - name: Upload artifact signatures to GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release upload
          '${{ github.ref_name }}' dist/**
          --repo '${{ github.repository }}'
